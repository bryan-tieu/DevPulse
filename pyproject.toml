[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
# Only collect from tests/ — keep pytest out of airflow/logs (a Windows-unstattable
# scheduler symlink) and other non-test dirs.
testpaths = ["tests"]