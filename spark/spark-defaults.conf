# Single-node (local[*]) tuning for DevPulse.
#
# In local mode the driver JVM *is* the executor, and the default ~1g heap
# OOMs when all cores buffer concurrent resumable uploads to GCS (each open
# GCS output stream holds a multi-MB upload chunk). 4g comfortably covers one
# hour of the firehose. This MUST live here (or on the spark-submit CLI), not
# in the SparkSession builder — the JVM is already launched by the time Python
# runs, so an in-code spark.driver.memory is ignored in local mode.
#
# At real scale this is irrelevant: on a cluster you'd size executors, not the
# driver, and a distributed write fans uploads across many JVMs.
spark.driver.memory              4g
