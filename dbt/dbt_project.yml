# DevPulse dbt project — the GOLD layer: staging -> star schema -> marts, built
# over the silver_events table in BigQuery (the dbt source).
name: "devpulse"
version: "1.0.0"
config-version: 2

# Which profile (in profiles.yml) supplies the warehouse connection.
profile: "devpulse"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

# `dbt clean` removes these generated dirs.
clean-targets:
  - "target"
  - "dbt_packages"

# Materialization defaults per layer (override per-model with a config block):
#   staging -> view  : cheap, no storage, always fresh against silver. Staging is
#                      a 1:1 cleaned pass-through, so a table would waste storage
#                      and go stale.
#   marts   -> table : stable, fast to read; the API/dashboard query these.
# (fact_events flips to incremental on a later day — set per-model, not here.)
models:
  devpulse:
    staging:
      +materialized: view
    marts:
      +materialized: table

# Seeds = small, committed, static reference data loaded as a table (dbt seed).
# repo_languages is the enrichment stand-in (repo_id -> language) for the
# language_momentum mart — a placeholder for a real GitHub-repos-API source.
# BigQuery infers seed column types from the CSV; pin repo_id to INT64 so it
# joins cleanly against the fact's INT64 repo_id (a string would fail the join).
seeds:
  devpulse:
    repo_languages:
      +column_types:
        repo_id: int64
        language: string
