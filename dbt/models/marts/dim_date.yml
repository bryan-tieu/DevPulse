version: 2

models:
  - name: dim_date
    description: >
      Generated calendar dimension, one row per day across 2024 (the backfill
      window). Gap-free (date_spine), independent of the events. date_key is a
      smart YYYYMMDD integer key (Kimball convention) — the PK and the fact_events FK.
    columns:
      - name: date_key
        description: "Smart key — YYYYMMDD integer (e.g. 20240101). PK and fact_events FK."
        data_tests:
          - not_null
          - unique
      - name: full_date
        description: The calendar date (DATE).
        data_tests:
          - not_null
          - unique
      - name: month
        description: Month of year.
        data_tests:
          # dbt 1.11: generic-test args nest under `arguments`.
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 12
      - name: day_of_week
        description: "BigQuery day-of-week: 1 = Sunday … 7 = Saturday."
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 7
